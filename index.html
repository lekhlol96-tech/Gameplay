<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Срываем Маски: Динамический Микс</title>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042); color: #f8fafc; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; margin-top: 40px; }
        h1 { font-size: 2.3rem; background: linear-gradient(to right, #3b82f6, #a78bfa, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; font-weight: 800; }
        .btn { display: inline-block; padding: 14px 28px; background: linear-gradient(45deg, #3b82f6, #8b5cf6); color: white; border-radius: 50px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; cursor: pointer; border: none; margin-top: 15px; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        input[type="text"] { width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 1rem; margin-bottom: 15px; text-align: center; }
        #canvas-qr { background: white; padding: 10px; border-radius: 12px; margin: 20px auto; display: block; }
        .player-list { margin: 20px 0; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .player-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .player-item.active { color: #00f0ff; font-weight: bold; }
        .question-box { font-size: 1.5rem; font-weight: 600; margin: 30px 0; min-height: 100px; color: #fff; line-height: 1.4; }
        .question-box strong { color: #00f0ff; }
        .badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 15px; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }
        .badge-believe { background: rgba(236, 72, 153, 0.15); border: 1px solid #ec4899; color: #f472b6; }
        .badge-norm { background: rgba(59, 130, 246, 0.15); border: 1px solid #3b82f6; color: #60a5fa; }
        .hidden { display: none; }
        .share-link { font-size: 0.85rem; color: #94a3b8; word-break: break-all; margin-top: 10px; cursor: pointer; text-decoration: underline; }
        #status-text { font-size: 0.9rem; color: #a78bfa; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Срываем Маски ONLINE</h1>
        <div id="status-text">Синхронизация сети...</div>

        <!-- ЭКРАН 1A: ХОСТ -->
        <div id="screen-auth-host">
            <input type="text" id="username-host" placeholder="Ваше имя" maxlength="15">
            <button class="btn" onclick="initSession(true)">Создать комнату</button>
        </div>

        <!-- ЭКРАН 1B: ГОСТЬ -->
        <div id="screen-auth-guest" class="hidden">
            <div class="badge badge-norm">Вас пригласили!</div>
            <p style="margin-bottom: 15px;">Комната: <strong id="guest-room-id" style="color: #06b6d4;"></strong></p>
            <input type="text" id="username-guest" placeholder="Ваше имя" maxlength="15">
            <button class="btn" style="background: linear-gradient(45deg, #10b981, #059669);" onclick="initSession(false)">Присоединиться к игре</button>
        </div>

        <!-- ЭКРАН 2: ЛОББИ -->
        <div id="screen-lobby" class="hidden">
            <div class="badge badge-norm">Комната ожидания</div>
            <p>Код: <strong id="room-code-display" style="color:#06b6d4; font-size: 1.4rem;"></strong></p>
            <div id="qr-area">
                <canvas id="canvas-qr"></canvas>
                <div id="link-display" class="share-link">Скопировать ссылку</div>
            </div>
            <h3 style="margin-top:20px;">Игроки в сети:</h3>
            <div id="lobby-players" class="player-list"></div>
            <button class="btn" id="start-btn" onclick="pressStart()">Запустить Игру</button>
        </div>

        <!-- ЭКРАН 3: ИГРА -->
        <div id="screen-game" class="hidden">
            <div id="round-tag" class="badge">Загрузка...</div>
            <h2 id="active-player-name" style="color: #a78bfa; margin-bottom: 15px;">...</h2>
            <div id="question-text" class="question-box">Загрузка карточки...</div>
            
            <!-- ДИНАМИЧЕСКИЕ КНОПКИ УПРАВЛЕНИЯ -->
            <div id="controls-believe" class="hidden">
                <button class="btn" style="background: linear-gradient(45deg, #10b981, #059669);" onclick="sendAction('ANSWER_TRUE')">Верю! (+1)</button>
                <button class="btn" style="background: linear-gradient(45deg, #ef4444, #dc2626);" onclick="sendAction('ANSWER_FALSE')">Не верю! (0)</button>
            </div>

            <div id="controls-norm" class="hidden">
                <button class="btn" style="background: linear-gradient(45deg, #3b82f6, #1d4ed8);" onclick="sendAction('ANSWER_TRUE')">Это Норм (+1)</button>
                <button class="btn" style="background: linear-gradient(45deg, #f59e0b, #b45309);" onclick="sendAction('ANSWER_FALSE')">Полный Стрем (0)</button>
            </div>

            <h3 style="margin-top:30px;">Таблица очков:</h3>
            <div id="game-players" class="player-list"></div>
        </div>
    </div>

    <script>
        let myName = "";
        let roomId = "";
        let isHost = false;
        let myId = "usr_" + Math.floor(Math.random() * 1000000);
        let eventSource = null;
        let localPool = [];

        let gameState = {
            state: "lobby",
            activeIndex: 0,
            currentQ: { type: "believe", cat: "Старт", text: "Ожидание..." },
            players: []
        };

        // РАСШИРЕННАЯ БАЗА ВОПРОСОВ (40 КАРТОЧЕК)
        const questionsDatabase = [
            // --- КАТЕГОРИЯ: ВЕРИШЬ ИЛИ НЕТ (20 штук) ---
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи факт о себе (правду или ложь): «Я однажды тайно взял чужую вещь или деньги и до сих пор не признался». Верите?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я по глазам сразу вижу, когда кто-то из присутствующих пытается соврать или что-то недоговаривает». Блеф или правда?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи историю: «Я когда-то потратил абсолютно все свои сбережения на полную глупость за один день». Верите или это выдумка?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я могу прямо сейчас без подготовки детально вспомнить и пересказать наш самый первый день знакомства». Верите?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи историю: «У меня был случай, когда я чудом избежал огромных проблем или штрафа благодаря чистой харизме». Правда или ложь?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я тайно проверял телефон или соцсети близкого человека без его ведома». Верите или я чист?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я хоть раз в жизни искренне радовался крупной неудаче человека, который мне сильно не нравится». Правда или блеф?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи факт: «У меня есть странная привычка, которую я делаю, только когда остаюсь дома в абсолютном одиночестве». Верите?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я помню наизусть номера телефонов как минимум двоих людей в этой комнате». Проверим?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я трачу на просмотр коротких видео в соцсетях (рилсы/шортсы) больше 4 часов в день». Правда или я преувеличиваю?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи историю: «Я однажды притворился спящим или больным, чтобы просто не идти на важную встречу, на которую обещал прийти». Верите?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я до сих пор помню детскую обиду на одного из присутствующих, хотя внешне делаю вид, что всё забыто». Правда или блеф?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи факт: «У меня есть фейковый аккаунт в соцсетях, с которого я тайно слежу за бывшими или знакомыми». Верите?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я могу прямо сейчас съесть чайную ложку острой горчицы или перца и даже не поморщиться». Верите? Проверим?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи историю: «Я однажды случайно сломал дорогую вещь в гостях или магазине и незаметно вернул её на место, сделав вид, что так и было». Верите?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я считаю себя самым умным и рассудительным человеком в этой компании, просто редко говорю об этом вслух». Правда или блеф?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи историю: «Я когда-то пробовал запустить свой бизнес или заработать легкие деньги в интернете, но полностью прогорел». Верите?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я трачу на спонтанные покупки в интернет-магазинах гораздо больше денег, чем планирую на месяц». Правда?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи факт: «Я хотя бы раз в жизни искренне плакал во время просмотра мультфильма или комедии». Верите или я кремень?" },
            { type: "believe", cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я знаю один секрет про человека из этой комнаты, о котором он сам даже не догадывается, что я знаю». Блеф или чистая правда?" },

            // --- КАТЕГОРИЯ: НОРМ ИЛИ СТРЕМ (20 штук) ---
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Одолжить лучшему другу крупную сумму денег, но потребовать с него расписку или процент за ожидание. Ребята, это норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Оборвать общение со старым другом без объяснения причин, просто потому что стало скучно и не о чем говорить. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Тайком от компании съесть последнюю вкусняшку из общего холодильника, зная, что её хотели все. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Забыть про день рождения хорошего друга, а вспомнив через неделю, просто соврать, что у тебя не работал телефон. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Начать флиртовать или общаться с бывшим парнем / бывшей девушкой своего друга. Друзья, норм или откровенный стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Если бы у вас была возможность абсолютно тайно прочитать личную переписку человека в этой комнате, сделать это. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Прийти на встречу, понять, что тебе скучно, и уйти через 15 минут, соврав, что дома «срочно прорвало трубу». Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Дарить друзьям на праздники передаренные вещи, которые когда-то подарили тебе, но они тебе не пригодились. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Искренне сказать другу в лицо, что его новая стрижка или одежда выглядит ужасно, вместо дежурной вежливой похвалы. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Сидеть на общей встрече в компании друзей и залипать в телефоне 80% времени, отвечая только невпопад. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Просить разделить счет в ресторане строго до копейки по позициям, если твой друг съел на 150 рублей больше, чем ты. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Позвать друзей помочь с переездом или тяжелой работой, а в конце вместо нормальной еды или оплаты просто сказать «спасибо, выручили». Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Встречаться с кем-то ради денег, комфорта или красивых подарков, открыто признавая это самому себе. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Пожаловаться начальнику или старшему на косяк своего коллеги, чтобы обезопасить себя или получить бонус. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Занимать деньги у друзей и регулярно «забывать» вернуть их вовремя, отдавая только после третьей жесткой напоминалки. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Начать обсуждать и критиковать общих знакомых или друзей за их спиной, когда они уходят из комнаты. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Не прийти на важное мероприятие к другу (например, свадьбу или юбилей), потому что тебе стало лень или захотелось остаться дома поиграть в ПК. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Проверять лайки и подписки своего близкого человека и устраивать сцены ревности из-за случайных картинок в интернете. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Оставить негативный отзыв маленькому кафе или мастеру из интернета из-за незначительной мелочи, испортив им рейтинг. Норм или стрем?" },
            { type: "norm", cat: "⚖️ НОРМ ИЛИ СТРЕМ?", text: "Ситуация: Рассказать чужой секрет другому человеку, взяв с него клятву «только никому не говори!». Норм или стрем?" }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('room')) {
            roomId = urlParams.get('room');
            document.getElementById('screen-auth-host').classList.add('hidden');
            document.getElementById('screen-auth-guest').classList.remove('hidden');
            document.getElementById('guest-room-id').innerText = roomId;
        }

        function getTopicName() { return "sm_maski_v5_room_" + roomId; }

        async function sendNetMessage(payload) {
            try {
                await fetch("https://ntfy.sh/" + getTopicName(), { method: "POST", body: JSON.stringify(payload) });
            } catch(e) {}
        }

        function initSession(hostFlag) {
            isHost = hostFlag;
            myName = isHost ? document.getElementById('username-host').value.trim() : document.getElementById('username-guest').value.trim();
            if (!myName) return alert("Введите имя!");

            if (isHost) roomId = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('status-text').innerText = "Подключение...";
            
            eventSource = new EventSource("https://ntfy.sh/" + getTopicName() + "/sse");
            
            eventSource.onopen = () => {
                document.getElementById('status-text').innerText = "В сети";
                if (isHost) {
                    gameState.players = [{ id: myId, name: myName, score: 0 }];
                    renderUI();
                } else {
                    sendNetMessage({ type: "JOIN_REQ", id: myId, name: myName });
                }
            };

            eventSource.onmessage = (event) => {
                try {
                    let data = JSON.parse(event.data);
                    let msg = JSON.parse(data.message);
                    handleNetworkMessage(msg);
                } catch(e) {}
            };
        }

        function handleNetworkMessage(msg) {
            if (isHost) {
                if (msg.type === "JOIN_REQ") {
                    if (!gameState.players.some(p => p.id === msg.id)) {
                        gameState.players.push({ id: msg.id, name: msg.name, score: 0 });
                        sendNetMessage({ type: "SYNC", state: gameState });
                        renderUI();
                    }
                }
                if (msg.type === "ACTION") processAction(msg.action);
            } else {
                if (msg.type === "SYNC") {
                    gameState = msg.state;
                    renderUI();
                }
            }
        }

        function sendAction(actionType) {
            if (isHost) processAction(actionType);
            else sendNetMessage({ type: "ACTION", action: actionType });
        }

        function processAction(actionType) {
            if (!isHost) return;
            
            if (actionType === "ANSWER_TRUE") {
                gameState.players[gameState.activeIndex].score += 1;
            }
            
            if (actionType !== "START") {
                gameState.activeIndex = (gameState.activeIndex + 1) % gameState.players.length;
            }
            
            if (localPool.length === 0) {
                localPool = [...questionsDatabase];
            }

            let randomIndex = Math.floor(Math.random() * localPool.length);
            let targetQuestion = localPool.splice(randomIndex, 1)[0];

            let activePlayer = gameState.players[gameState.activeIndex];
            let otherPlayers = gameState.players.filter(p => p.id !== activePlayer.id).map(p => p.name);
            otherPlayers.sort(() => Math.random() - 0.5);

            let text = targetQuestion.text;
            text = text.replace(/{T1}/g, otherPlayers[0] || "друг");
            text = text.replace(/{T2}/g, otherPlayers[1] || "компания");

            gameState.currentQ = { type: targetQuestion.type, cat: targetQuestion.cat, text: text };
            gameState.state = "game";

            sendNetMessage({ type: "SYNC", state: gameState });
            renderUI();
        }

        function pressStart() {
            if (!isHost) return;
            if (gameState.players.length < 2) return alert("Нужно хотя бы 2 игрока!");
            processAction("START");
        }

        function renderUI() {
            document.getElementById('screen-auth-host').classList.add('hidden');
            document.getElementById('screen-auth-guest').classList.add('hidden');

            if (gameState.state === "lobby") {
                document.getElementById('screen-lobby').classList.remove('hidden');
                document.getElementById('room-code-display').innerText = roomId;

                if (!isHost) {
                    document.getElementById('qr-area').classList.add('hidden');
                    document.getElementById('start-btn').classList.add('hidden');
                } else {
                    let shareUrl = window.location.href.split('?')[0] + "?room=" + roomId;
                    document.getElementById('canvas-qr').innerHTML = ""; 
                    new QRious({ element: document.getElementById('canvas-qr'), value: shareUrl, size: 160 });
                    document.getElementById('link-display').onclick = () => {
                        navigator.clipboard.writeText(shareUrl);
                        alert("Ссылка скопирована!");
                    };
                }

                const list = document.getElementById('lobby-players');
                list.innerHTML = "";
                gameState.players.forEach(p => {
                    list.innerHTML += `<div class="player-item"><span>${p.name}</span><span style="color:#10b981">В сети</span></div>`;
                });
            } else if (gameState.state === "game") {
                document.getElementById('screen-lobby').classList.add('hidden');
                document.getElementById('screen-game').classList.remove('hidden');

                let activePlayer = gameState.players[gameState.activeIndex];
                let tagEl = document.getElementById('round-tag');
                tagEl.innerText = gameState.currentQ.cat;
                
                // ДИНАМИЧЕСКОЕ ПЕРЕКЛЮЧЕНИЕ КНОПОК И ЦВЕТА
                let believeControls = document.getElementById('controls-believe');
                let normControls = document.getElementById('controls-norm');

                if (gameState.currentQ.type === "believe") {
                    tagEl.className = "badge badge-believe";
                    believeControls.classList.remove('hidden');
                    normControls.classList.add('hidden');
                } else {
                    tagEl.className = "badge badge-norm";
                    normControls.classList.remove('hidden');
                    believeControls.classList.add('hidden');
                }

                document.getElementById('active-player-name').innerText = "Ход игрока: " + activePlayer.name;
                document.getElementById('question-text').innerHTML = gameState.currentQ.text;

                const list = document.getElementById('game-players');
                list.innerHTML = "";
                gameState.players.forEach((p, idx) => {
                    let isCurrent = idx === gameState.activeIndex ? "active" : "";
                    list.innerHTML += `<div class="player-item ${isCurrent}"><span>${p.name} ${isCurrent?'🎲':''}</span><span>${p.score}🏆</span></div>`;
                });
            }
        }
    </script>
</body>
</html>
