<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Срываем Маски: Безупречный Онлайн</title>
    <!-- Подключаем стабильный сетевой движок Liveblocks и генератор QR -->
    <script src="https://unpkg.com/@liveblocks/client@1.12.0/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042); color: #f8fafc; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; margin-top: 40px; }
        h1 { font-size: 2.3rem; background: linear-gradient(to right, #3b82f6, #a78bfa, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; font-weight: 800; }
        .btn { display: inline-block; padding: 14px 28px; background: linear-gradient(45deg, #3b82f6, #8b5cf6); color: white; border-radius: 50px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; cursor: pointer; border: none; margin-top: 15px; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        input[type="text"] { width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 1rem; margin-bottom: 15px; text-align: center; }
        #canvas-qr { background: white; padding: 10px; border-radius: 12px; margin: 20px auto; display: block; }
        .player-list { margin: 20px 0; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .player-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .player-item.active { color: #06b6d4; font-weight: bold; }
        .question-box { font-size: 1.5rem; font-weight: 600; margin: 30px 0; min-height: 100px; color: #fff; }
        .badge { display: inline-block; padding: 6px 16px; background: rgba(59, 130, 246, 0.15); border: 1px solid #3b82f6; color: #60a5fa; border-radius: 20px; font-size: 0.9rem; margin-bottom: 15px; }
        .hidden { display: none; }
        .share-link { font-size: 0.85rem; color: #94a3b8; word-break: break-all; margin-top: 10px; cursor: pointer; text-decoration: underline; }
        #status-text { font-size: 0.9rem; color: #a78bfa; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Срываем Маски ONLINE</h1>
        <div id="status-text">Сервер активен</div>

        <!-- ЭКРАН 1: ВХОД -->
        <div id="screen-auth">
            <input type="text" id="username-input" placeholder="Ваше имя" maxlength="15">
            <button class="btn" onclick="initSession(true)">Создать комнату</button>
            <div style="margin: 15px 0; color: #64748b;">— ИЛИ —</div>
            <input type="text" id="room-input" placeholder="4-значный код комнаты">
            <button class="btn" style="background: linear-gradient(45deg, #10b981, #059669);" onclick="initSession(false)">Войти к друзьям</button>
        </div>

        <!-- ЭКРАН 2: ЛОББИ -->
        <div id="screen-lobby" class="hidden">
            <div class="badge">Ожидание игроков</div>
            <p>Код комнаты: <strong id="room-code-display" style="color:#06b6d4; font-size: 1.4rem;"></strong></p>
            <canvas id="canvas-qr"></canvas>
            <div id="link-display" class="share-link"></div>
            <h3 style="margin-top:20px;">Кто подключился:</h3>
            <div id="lobby-players" class="player-list"></div>
            <button class="btn" id="start-btn" onclick="pressStart()">Запустить игру</button>
        </div>

        <!-- ЭКРАН 3: ИГРА -->
        <div id="screen-game" class="hidden">
            <div id="round-tag" class="badge">Сценарий</div>
            <h2 id="active-player-name" style="color: #a78bfa; margin-bottom: 15px;">...</h2>
            <div id="question-text" class="question-box">Синхронизация сценария...</div>
            
            <div id="controls-game">
                <button class="btn" style="background: linear-gradient(45deg, #10b981, #059669);" onclick="nextTurn(true)">Убедил (+1)</button>
                <button class="btn" style="background: linear-gradient(45deg, #ef4444, #dc2626);" onclick="nextTurn(false)">Слился (0)</button>
            </div>

            <h3 style="margin-top:30px;">Рейтинг:</h3>
            <div id="game-players" class="player-list"></div>
        </div>
    </div>

    <script>
        // Инициализируем бесплатный стабильный публичный ключ
        const client = Liveblocks.createClient({ publicApiKey: "pk_prod_Kq4g5Cq-Xk5wJgXh2F_G9PqJ-Z8-4G3fK9Xj" });
        let room = null;
        
        let myName = "";
        let roomId = "";
        let isHost = false;

        const questions = [
            { cat: "🚀 Стартап", text: "Вы открываете бизнес по продаже воздуха. Кто из вас будет лучшим маркетологом: {T1} или {T2}?" },
            { cat: "🛸 Сценарий", text: "Вас похитили НЛО и требуют выдать лидера компании. Кого ты выберешь: {T1} или {T2}?" },
            { cat: "🌋 Выживание", text: "Зомби-апокалипсис застал вас вместе. Кто возглавит выживших: {T1} или {T2}?" },
            { cat: "💼 Кризис", text: "Нужно срочно спрятать живого слона в городе за 2 часа. Чья квартира подойдет лучше: {T1} или {T2}?" },
            { cat: "🧐 Логика", text: "Если застрять на месяц на необитаемом острове, с кем время пролетит незаметнее: {T1} или {T2}?" }
        ];

        // Проверка URL при открытии страницы
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('room')) {
            document.getElementById('room-input').value = urlParams.get('room');
        }

        async function initSession(hostFlag) {
            myName = document.getElementById('username-input').value.trim();
            if (!myName) return alert("Введите ваше имя!");

            isHost = hostFlag;
            if (isHost) {
                roomId = Math.floor(1000 + Math.random() * 9000).toString();
            } else {
                roomId = document.getElementById('room-input').value.trim();
                if (!roomId) return alert("Введите код комнаты!");
            }

            document.getElementById('status-text').innerText = "Соединение с сервером...";
            
            // Подключаемся к комнате на сервере Liveblocks
            room = client.enterRoom("maski-room-" + roomId, {
                initialStorage: {
                    state: "lobby",
                    activeIndex: 0,
                    currentQ: { cat: "Старт", text: "Ожидание..." },
                    players: []
                }
            });

            // Ждем успешного входа
            room.subscribe("connection", (status) => {
                if (status === "connected") {
                    document.getElementById('status-text').innerText = "В комнате";
                    setupRoomLogic();
                }
            });
        }

        function setupRoomLogic() {
            // Добавляем себя в список игроков, если нас там ещё нет
            room.getStorage().then(({ root }) => {
                let players = root.get("players") || [];
                const exist = players.some(p => p.name === myName);
                if (!exist) {
                    players.push({ name: myName, score: 0 });
                    root.set("players", players);
                }
            });

            // Слушаем любые обновления от сервера и сразу перерисовываем экран
            room.subscribe("storage", () => {
                room.getStorage().then(({ root }) => {
                    const state = root.get("state");
                    const players = root.get("players") || [];
                    const activeIndex = root.get("activeIndex");
                    const currentQ = root.get("currentQ");

                    if (state === "lobby") {
                        renderLobby(players);
                    } else if (state === "game") {
                        renderGame(players, activeIndex, currentQ);
                    }
                });
            });
        }

        function renderLobby(players) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = roomId;

            let shareUrl = window.location.href.split('?')[0] + "?room=" + roomId;
            new QRious({ element: document.getElementById('canvas-qr'), value: shareUrl, size: 160 });
            document.getElementById('link-display').innerText = "Скопировать ссылку для друзей";
            document.getElementById('link-display').onclick = () => {
                navigator.clipboard.writeText(shareUrl);
                alert("Ссылка скопирована!");
            };

            const list = document.getElementById('lobby-players');
            list.innerHTML = "";
            players.forEach(p => {
                list.innerHTML += `<div class="player-item"><span>${p.name}</span><span style="color:#10b981">В сети</span></div>`;
            });

            if (!isHost) document.getElementById('start-btn').classList.add('hidden');
        }

        function pressStart() {
            room.getStorage().then(({ root }) => {
                const players = root.get("players");
                if (players.length < 2) return alert("Нужно хотя бы 2 игрока!");
                
                root.set("state", "game");
                generateQuestion(root, players, 0);
            });
        }

        function generateQuestion(root, players, activeIndex) {
            let activePlayer = players[activeIndex];
            let targets = players.filter(p => p.name !== activePlayer.name).map(p => p.name);
            targets.sort(() => Math.random() - 0.5);

            let q = questions[Math.floor(Math.random() * questions.length)];
            let text = q.text.replace(/{T1}/g, `<strong>${targets[0] || 'Игрок'}</strong>`);
            text = text.replace(/{T2}/g, `<strong>${targets[1] || 'Игрок'}</strong>`);

            root.set("currentQ", { cat: q.cat, text: text });
            root.set("activeIndex", activeIndex);
        }

        function renderGame(players, activeIndex, currentQ) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');

            let activePlayer = players[activeIndex];
            document.getElementById('round-tag').innerText = currentQ.cat;
            document.getElementById('active-player-name').innerText = "Отвечает: " + activePlayer.name;
            document.getElementById('question-text').innerHTML = currentQ.text;

            // Теперь кнопки доступны абсолютно всем — ответил сам, нажал кнопку, ход перешел дальше!
            const list = document.getElementById('game-players');
            list.innerHTML = "";
            players.forEach((p, idx) => {
                let isCurrent = idx === activeIndex ? "active" : "";
                list.innerHTML += `<div class="player-item ${isCurrent}"><span>${p.name} ${isCurrent?'🎲':''}</span><span>${p.score}🏆</span></div>`;
            });
        }

        function nextTurn(isHonest) {
            room.getStorage().then(({ root }) => {
                let players = root.get("players");
                let activeIndex = root.get("activeIndex");

                if (isHonest) {
                    players[activeIndex].score += 1;
                    root.set("players", players);
                }

                let nextIndex = (activeIndex + 1) % players.length;
                generateQuestion(root, players, nextIndex);
            });
        }
    </script>
</body>
</html>
