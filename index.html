        function getTopicName() { return "maski_room_" + (roomId || "global"); }

        async function sendNetMessage(payload) {
            await fetch("https://ntfy.sh/" + getTopicName(), { method: "POST", body: JSON.stringify(payload) });
        }

        function initSession(host) {
            isHost = host;
            myName = document.getElementById('username').value || "Игрок";
            roomId = host ? Math.floor(1000 + Math.random() * 9000).toString() : prompt("Код комнаты:");
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = "Комната: " + roomId;
            
            new QRious({ element: document.getElementById('canvas-qr'), value: window.location.href.split('?')[0] + "?join=" + roomId, size: 160 });
            startNetwork();
        }

        function startNetwork() {
            eventSource = new EventSource("https://ntfy.sh/" + getTopicName() + "/sse");
            eventSource.onmessage = (e) => {
                let data = JSON.parse(JSON.parse(e.data).message);
                if (data.type === "SYNC") { gameState = data.state; renderUI(); }
                else if (isHost) handleHostAction(data);
            };
            if (!isHost) sendNetMessage({ type: "JOIN", id: myId, name: myName });
            else { gameState.players = [{id: myId, name: myName}]; renderUI(); }
        }

        function handleHostAction(msg) {
            if (msg.type === "JOIN") {
                if (!gameState.players.find(p => p.id === msg.id)) {
                    gameState.players.push({id: msg.id, name: msg.name});
                    sendSync();
                }
            } else if (msg.type === "START") { gameState.state = "game"; newQuestion(); }
            else if (msg.type === "VOTE") {
                gameState.votes[msg.id] = msg.choice;
                if (Object.keys(gameState.votes).length >= gameState.players.length) gameState.phase = 'result';
                sendSync();
            } else if (msg.type === "NEXT") newQuestion();
        }

        function newQuestion() {
            gameState.phase = 'vote';
            gameState.votes = {};
            
            // УМНАЯ КОЛОДА: Если пул пуст, копируем всю базу заново
            if (localPool.length === 0) {
                localPool = [...questionsDatabase];
            }

            // Вытаскиваем случайный вопрос и УДАЛЯЕМ его из пула
            let randomIndex = Math.floor(Math.random() * localPool.length);
            let targetQuestion = localPool.splice(randomIndex, 1)[0];

            gameState.currentQ = { text: targetQuestion };
            sendSync();
        }

        function sendSync() { sendNetMessage({ type: "SYNC", state: gameState }); }
        function sendAction(act) { sendNetMessage({ type: act }); }
        function vote(c) { sendNetMessage({ type: "VOTE", id: myId, choice: c }); }

        function renderUI() {
            if (gameState.state === "lobby") {
                let list = ""; gameState.players.forEach(p => list += `<div style="padding:5px 0;">✅ ${p.name}</div>`);
                document.getElementById('lobby-players').innerHTML = list;
            } else {
                document.getElementById('screen-lobby').classList.add('hidden');
                document.getElementById('screen-game').classList.remove('hidden');
                document.getElementById('question-text').innerText = gameState.currentQ.text;
                
                if (gameState.phase === 'vote') {
                    document.getElementById('phase-vote').classList.remove('hidden');
                    document.getElementById('phase-results').classList.add('hidden');
                } else {
                    document.getElementById('phase-vote').classList.add('hidden');
                    document.getElementById('phase-results').classList.remove('hidden');
                    let list = ""; 
                    gameState.players.forEach(p => {
                        let v = gameState.votes[p.id] || "Думает...";
                        let colorClass = (v === 'Норм') ? 'color-norm' : 'color-strem';
                        list += `<div class="result-item ${colorClass}"><span>${p.name}</span><span>${v}</span></div>`;
                    });
                    document.getElementById('results-list').innerHTML = list;
                }
            }
        }
