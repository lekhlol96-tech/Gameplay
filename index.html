<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Срываем Маски: Норм или Стрем</title>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); text-align: center; }
        .btn { display: block; padding: 15px; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; width: 100%; margin-top: 15px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:active { transform: scale(0.98); }
        .hidden { display: none; }
        .question-box { font-size: 1.3rem; margin: 20px 0; font-weight: 600; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 15px; }
        .result-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; }
        .badge { padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: inline-block; background: #4f46e5; }
        
        /* Цветовые стили для игры */
        .color-norm { color: #10b981 !important; } /* Зеленый */
        .color-strem { color: #ef4444 !important; } /* Красный */
    </style>
</head>
<body>

    <div class="container">
        <h1>Срываем Маски</h1>
        
        <!-- АВТОРИЗАЦИЯ -->
        <div id="screen-auth">
            <input type="text" id="username" placeholder="Твое имя" style="padding:12px; width:100%; border-radius:8px; border:none; margin-bottom:10px; background: rgba(255,255,255,0.1); color: white; text-align: center;">
            <button class="btn" style="background: #3b82f6;" onclick="initSession(true)">Создать комнату</button>
        </div>

        <!-- ЛОББИ -->
        <div id="screen-lobby" class="hidden">
            <h3 id="room-code-display" style="margin-bottom:15px;"></h3>
            <canvas id="canvas-qr" style="background:white; padding:10px; border-radius:12px; margin: 0 auto; display: block;"></canvas>
            <div id="lobby-players" style="margin: 20px 0; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;"></div>
            <button class="btn" style="background:#10b981" onclick="sendAction('START')">ЗАПУСТИТЬ ИГРУ</button>
        </div>

        <!-- ИГРА -->
        <div id="screen-game" class="hidden">
            <div id="round-tag" class="badge">⚖️ НОРМ ИЛИ СТРЕМ?</div>
            <div id="question-text" class="question-box"></div>
            
            <!-- Кнопки выбора фазы голосования -->
            <div id="phase-vote">
                <button class="btn" style="background:#10b981" onclick="vote('Норм')">ЭТО НОРМ</button>
                <button class="btn" style="background:#ef4444" onclick="vote('СТРЕМ')">ПОЛНЫЙ СТРЕМ</button>
            </div>

            <!-- Экран результатов -->
            <div id="phase-results" class="hidden">
                <h3 style="margin-bottom: 10px;">Результаты голосования:</h3>
                <div id="results-list" style="margin: 20px 0; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px;"></div>
                <button class="btn" style="background:#8b5cf6" onclick="sendAction('NEXT')">Следующий вопрос</button>
            </div>
        </div>
    </div>

    <script>
        let myName = "", roomId = "", isHost = false, myId = "u" + Math.floor(Math.random()*1000000);
        let gameState = { state: "lobby", phase: 'vote', activeIndex: 0, currentQ: {}, players: [], votes: {} };
        let eventSource = null;
        
        const questions = [
            // Работа
            "Уйти с работы на час раньше, договорившись со сменщиком в обход начальника? Норм или стрем?",
            "Взять с работы домой канцелярию или инструменты, ведь 'у компании не убудет'? Норм или стрем?",
            "Притвориться больным, чтобы взять отгул на день, когда на самом деле просто хочешь выспаться? Норм или стрем?",
            "Обсуждать зарплаты коллег за их спиной, чтобы понять, сколько они получают? Норм или стрем?",
            // Транспорт
            "Включить громко видео в автобусе без наушников? Норм или стрем?",
            "Сделать вид, что спишь, чтобы не уступать место пожилому человеку? Норм или стрем?",
            "Занимать два места в электричке, когда много людей? Норм или стрем?",
            // Чистота и быт
            "Не мыть за собой посуду в общей квартире 3 дня? Норм или стрем?",
            "Оставить после себя грязный унитаз в общественном туалете? Норм или стрем?",
            "Пользоваться чужой косметикой или средствами гигиены без спроса? Норм или стрем?",
            // Постель и интим
            "Пользоваться зубной щеткой партнера без спроса? Норм или стрем?",
            "Скрывать свои интимные предпочтения от партнера в начале отношений? Норм или стрем?",
            "Оставаться ночевать и уходить по-английски, даже не попрощавшись? Норм или стрем?",
            "Хранить фото бывших в 'секретной' папке на телефоне? Норм или стрем?",
            // Природа и отдых
            "Оставить пакет с мусором в лесу после пикника, потому что 'мусорка далеко'? Норм или стрем?",
            "Приехать на дачу к друзьям и съесть всю дорогую еду, не скинувшись? Норм или стрем?",
            "Включать колонку с музыкой на всю громкость на пляже, где есть другие люди? Норм или стрем?",
            // Личные дилеммы
            "Смотреть чужой телефон, пока человек в душе? Норм или стрем?",
            "Встречаться с кем-то только из-за денег или связей? Норм или стрем?",
            "Узнать об измене парня/девушки лучшего друга и промолчать? Норм или стрем?",
            "Присвоить себе найденные на улице деньги, не пытаясь найти владельца? Норм или стрем?"
        ];

        function getTopicName() { return "maski_room_" + (roomId || "global"); }

        async function sendNetMessage(payload) {
            await fetch("https://ntfy.sh/" + getTopicName(), { method: "POST", body: JSON.stringify(payload) });
        }

        function initSession(host) {
            isHost = host;
            myName = document.getElementById('username').value || "Игрок";
            roomId = host ? Math.floor(1000 + Math.random() * 9000).toString() : prompt("Код комнаты:");
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = "Комната: " + roomId;
            
            // Исправленная генерация QR-кода
            new QRious({ element: document.getElementById('canvas-qr'), value: window.location.href.split('?')[0] + "?join=" + roomId, size: 160 });
            startNetwork();
        }

        function startNetwork() {
            eventSource = new EventSource("https://ntfy.sh/" + getTopicName() + "/sse");
            eventSource.onmessage = (e) => {
                let data = JSON.parse(JSON.parse(e.data).message);
                if (data.type === "SYNC") { gameState = data.state; renderUI(); }
                else if (isHost) handleHostAction(data);
            };
            if (!isHost) sendNetMessage({ type: "JOIN", id: myId, name: myName });
            else { gameState.players = [{id: myId, name: myName}]; renderUI(); }
        }

        function handleHostAction(msg) {
            if (msg.type === "JOIN") {
                if (!gameState.players.find(p => p.id === msg.id)) {
                    gameState.players.push({id: msg.id, name: msg.name});
                    sendSync();
                }
            } else if (msg.type === "START") { gameState.state = "game"; newQuestion(); }
            else if (msg.type === "VOTE") {
                gameState.votes[msg.id] = msg.choice;
                if (Object.keys(gameState.votes).length >= gameState.players.length) gameState.phase = 'result';
                sendSync();
            } else if (msg.type === "NEXT") newQuestion();
        }

        function newQuestion() {
            gameState.phase = 'vote';
            gameState.votes = {};
            gameState.currentQ = { text: questions[Math.floor(Math.random() * questions.length)] };
            sendSync();
        }

        function sendSync() { sendNetMessage({ type: "SYNC", state: gameState }); }
        function sendAction(act) { sendNetMessage({ type: act }); }
        function vote(c) { sendNetMessage({ type: "VOTE", id: myId, choice: c }); }

        function renderUI() {
            if (gameState.state === "lobby") {
                let list = ""; gameState.players.forEach(p => list += `<div style="padding:5px 0;">✅ ${p.name}</div>`);
                document.getElementById('lobby-players').innerHTML = list;
            } else {
                document.getElementById('screen-lobby').classList.add('hidden');
                document.getElementById('screen-game').classList.remove('hidden');
                document.getElementById('question-text').innerText = gameState.currentQ.text;
                
                if (gameState.phase === 'vote') {
                    document.getElementById('phase-vote').classList.remove('hidden');
                    document.getElementById('phase-results').classList.add('hidden');
                } else {
                    document.getElementById('phase-vote').classList.add('hidden');
                    document.getElementById('phase-results').classList.remove('hidden');
                    let list = ""; 
                    gameState.players.forEach(p => {
                        let v = gameState.votes[p.id] || "Думает...";
                        // Определяем класс цвета на основе выбора
                        let colorClass = (v === 'Норм') ? 'color-norm' : 'color-strem';
                        
                        // Применяем цветовой класс и на имя, и на ответ игрока
                        list += `<div class="result-item ${colorClass}"><span>${p.name}</span><span>${v}</span></div>`;
                    });
                    document.getElementById('results-list').innerHTML = list;
                }
            }
        }
    </script>
</body>
</html>
