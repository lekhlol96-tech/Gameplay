<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Срываем Маски ONLINE</title>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255, 255, 255, 0.03); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .btn { display: inline-block; padding: 14px 28px; background: #3b82f6; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; width: 100%; margin-top: 10px; }
        .hidden { display: none; }
        .question-box { font-size: 1.4rem; margin: 20px 0; font-weight: 600; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        .results-list { text-align: left; margin: 20px 0; }
        .result-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .badge { padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; }
        .badge-norm { background: #3b82f6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Срываем Маски</h1>
        
        <div id="screen-auth-host">
            <input type="text" id="username" placeholder="Ваше имя" style="padding:10px; width:100%; border-radius:8px; margin-bottom:10px;">
            <button class="btn" onclick="initSession(true)">Создать комнату</button>
        </div>

        <div id="screen-lobby" class="hidden">
            <h2 id="room-code-display"></h2>
            <div id="lobby-players" style="margin: 20px 0;"></div>
            <button class="btn" onclick="sendAction('START')">ЗАПУСТИТЬ ИГРУ</button>
        </div>

        <div id="screen-game" class="hidden">
            <div id="round-tag" class="badge"></div>
            <div id="question-text" class="question-box"></div>
            
            <!-- Фаза голосования -->
            <div id="phase-vote">
                <button class="btn" style="background:#2563eb" onclick="vote('Норм')">Это Норм</button>
                <button class="btn" style="background:#d97706" onclick="vote('Стрем')">Полный Стрем</button>
            </div>

            <!-- Фаза результатов -->
            <div id="phase-results" class="hidden">
                <h3>Голоса:</h3>
                <div id="results-list" class="results-list"></div>
                <button class="btn" style="background:#10b981" onclick="sendAction('NEXT')">Следующий вопрос</button>
            </div>
        </div>
    </div>

    <script>
        let myName = "", roomId = "", isHost = false, myId = "usr_" + Math.floor(Math.random() * 1000000);
        let gameState = { state: "lobby", mode: "norm", activeIndex: 0, currentQ: {}, players: [], phase: 'vote', votes: {} };
        let eventSource = null;

        function getTopicName() { return "sm_maski_v7_room_" + roomId; }

        async function sendNetMessage(payload) {
            await fetch("https://ntfy.sh/" + getTopicName(), { method: "POST", body: JSON.stringify(payload) });
        }

        function initSession(host) {
            isHost = host;
            myName = document.getElementById('username').value || "Игрок";
            roomId = "7831"; // Хардкод для теста
            document.getElementById('screen-auth-host').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = "Комната: " + roomId;
            startNetwork();
        }

        function startNetwork() {
            eventSource = new EventSource("https://ntfy.sh/" + getTopicName() + "/sse");
            eventSource.onmessage = (e) => {
                let data = JSON.parse(JSON.parse(e.data).message);
                if (data.type === "SYNC") { gameState = data.state; renderUI(); }
                else if (isHost) handleHostAction(data);
            };
            if (!isHost) sendNetMessage({ type: "JOIN", id: myId, name: myName });
            else { gameState.players = [{id: myId, name: myName}]; renderUI(); }
        }

        function handleHostAction(msg) {
            if (msg.type === "JOIN") {
                if (!gameState.players.find(p => p.id === msg.id)) {
                    gameState.players.push({id: msg.id, name: msg.name});
                    sendSync();
                }
            } else if (msg.type === "START") {
                gameState.state = "game";
                newQuestion();
            } else if (msg.type === "VOTE") {
                gameState.votes[msg.id] = msg.choice;
                if (Object.keys(gameState.votes).length >= gameState.players.length) {
                    gameState.phase = 'result';
                }
                sendSync();
            } else if (msg.type === "NEXT") {
                newQuestion();
            }
        }

        function newQuestion() {
            gameState.phase = 'vote';
            gameState.votes = {};
            const pool = [
                "Уйти с работы на час раньше без спроса? Норм или стрем?",
                "Забрать найденные деньги? Норм или стрем?",
                "Оставить мусор в лесу? Норм или стрем?"
            ];
            gameState.currentQ = { text: pool[Math.floor(Math.random() * pool.length)] };
            sendSync();
        }

        function sendSync() { sendNetMessage({ type: "SYNC", state: gameState }); }
        function sendAction(act) { sendNetMessage({ type: act }); }
        function vote(choice) { sendNetMessage({ type: "VOTE", id: myId, choice: choice }); }

        function renderUI() {
            if (gameState.state === "lobby") return;
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            
            document.getElementById('question-text').innerText = gameState.currentQ.text;
            
            const voteDiv = document.getElementById('phase-vote');
            const resDiv = document.getElementById('phase-results');
            
            if (gameState.phase === 'vote') {
                voteDiv.classList.remove('hidden');
                resDiv.classList.add('hidden');
            } else {
                voteDiv.classList.add('hidden');
                resDiv.classList.remove('hidden');
                let html = "";
                gameState.players.forEach(p => {
                    let v = gameState.votes[p.id] || "Не проголосовал";
                    html += `<div class="result-item"><span>${p.name}</span><span>${v}</span></div>`;
                });
                document.getElementById('results-list').innerHTML = html;
            }
        }
    </script>
</body>
</html>
