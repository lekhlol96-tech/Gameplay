<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Срываем Маски: Верю / Не верю</title>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042); color: #f8fafc; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; margin-top: 40px; }
        h1 { font-size: 2.3rem; background: linear-gradient(to right, #3b82f6, #a78bfa, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; font-weight: 800; }
        .btn { display: inline-block; padding: 14px 28px; background: linear-gradient(45deg, #3b82f6, #8b5cf6); color: white; border-radius: 50px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; cursor: pointer; border: none; margin-top: 15px; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        input[type="text"] { width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 1rem; margin-bottom: 15px; text-align: center; }
        #canvas-qr { background: white; padding: 10px; border-radius: 12px; margin: 20px auto; display: block; }
        .player-list { margin: 20px 0; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .player-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .player-item.active { color: #06b6d4; font-weight: bold; }
        .question-box { font-size: 1.5rem; font-weight: 600; margin: 30px 0; min-height: 100px; color: #fff; line-height: 1.4; }
        .question-box strong { color: #00f0ff; }
        .badge { display: inline-block; padding: 6px 16px; background: rgba(236, 72, 153, 0.15); border: 1px solid #ec4899; color: #f472b6; border-radius: 20px; font-size: 0.9rem; margin-bottom: 15px; letter-spacing: 1px; }
        .hidden { display: none; }
        .share-link { font-size: 0.85rem; color: #94a3b8; word-break: break-all; margin-top: 10px; cursor: pointer; text-decoration: underline; }
        #status-text { font-size: 0.9rem; color: #a78bfa; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Срываем Маски ONLINE</h1>
        <div id="status-text">Синхронизация сети...</div>

        <!-- ЭКРАН 1A: ХОСТ -->
        <div id="screen-auth-host">
            <input type="text" id="username-host" placeholder="Ваше имя" maxlength="15">
            <button class="btn" onclick="initSession(true)">Создать комнату</button>
        </div>

        <!-- ЭКРАН 1B: ГОСТЬ -->
        <div id="screen-auth-guest" class="hidden">
            <div class="badge" style="background: rgba(16, 185, 129, 0.15); border-color: #10b981; color: #34d399;">Вас пригласили!</div>
            <p style="margin-bottom: 15px;">Комната: <strong id="guest-room-id" style="color: #06b6d4;"></strong></p>
            <input type="text" id="username-guest" placeholder="Ваше имя" maxlength="15">
            <button class="btn" style="background: linear-gradient(45deg, #10b981, #059669);" onclick="initSession(false)">Присоединиться к игре</button>
        </div>

        <!-- ЭКРАН 2: ЛОББИ -->
        <div id="screen-lobby" class="hidden">
            <div class="badge">Комната ожидания</div>
            <p>Код: <strong id="room-code-display" style="color:#06b6d4; font-size: 1.4rem;"></strong></p>
            <div id="qr-area">
                <canvas id="canvas-qr"></canvas>
                <div id="link-display" class="share-link">Скопировать ссылку</div>
            </div>
            <h3 style="margin-top:20px;">Игроки в сети:</h3>
            <div id="lobby-players" class="player-list"></div>
            <button class="btn" id="start-btn" onclick="pressStart()">Запустить Игру</button>
        </div>

        <!-- ЭКРАН 3: ИГРА -->
        <div id="screen-game" class="hidden">
            <div id="round-tag" class="badge">ВЕРИШЬ ИЛИ НЕТ?</div>
            <h2 id="active-player-name" style="color: #a78bfa; margin-bottom: 15px;">...</h2>
            <div id="question-text" class="question-box">Загрузка карточки...</div>
            
            <div id="controls-game">
                <button class="btn" style="background: linear-gradient(45deg, #10b981, #059669);" onclick="sendAction('ANSWER_TRUE')">Компания поверила (+1)</button>
                <button class="btn" style="background: linear-gradient(45deg, #ef4444, #dc2626);" onclick="sendAction('ANSWER_FALSE')">Раскусили / Стрем (0)</button>
            </div>

            <h3 style="margin-top:30px;">Таблица очков:</h3>
            <div id="game-players" class="player-list"></div>
        </div>
    </div>

    <script>
        let myName = "";
        let roomId = "";
        let isHost = false;
        // Уникальный ID сессии для защиты от дублирования имен
        let myId = "usr_" + Math.floor(Math.random() * 1000000);
        let eventSource = null;

        let gameState = {
            state: "lobby",
            activeIndex: 0,
            currentQ: { cat: "Старт", text: "Ожидание вопросов..." },
            players: []
        };

        // Полностью новая база на тему "Веришь или нет / Норм или стрем"
        const questions = [
            { cat: "🤔 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи факт о себе (правду или ложь): «Я однажды тайно взял чужую вещь/деньги и до сих пор не признался». Друзья, норм или стрем? Верите?" },
            { cat: "🤫 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я умею читать по губам или по глазам сразу вижу, когда кто-то из присутствующих врет». Верите?" },
            { cat: "👀 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение для игрока: Посмотри на человека напротив и скажи: «Я знаю твой самый главный комплекс». Правда или блеф?" },
            { cat: "💵 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи историю: «Я когда-то потратил абсолютно все свои сбережения на полную глупость за один день». Верите или это выдумка?" },
            { cat: "🎭 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Я могу прямо сейчас подделать подпись любого из вас так, что вы не отличите». Верите? Проверим?" },
            { cat: "🧠 ВЕРИШЬ ИЛИ НЕТ?", text: "Утверждение: «Если бы у меня была возможность тайно прочитать переписку одного человека в этой комнате, я бы ни за что не стал этого делать». Норм или стрем? Верите?" },
            { cat: "🌋 ВЕРИШЬ ИЛИ НЕТ?", text: "Расскажи историю: «У меня был случай, когда я чудом избежал огромного штрафа или проблем с полицией благодаря чистой харизме». Верите?" }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('room')) {
            roomId = urlParams.get('room');
            document.getElementById('screen-auth-host').classList.add('hidden');
            document.getElementById('screen-auth-guest').classList.remove('hidden');
            document.getElementById('guest-room-id').innerText = roomId;
        }

        function getTopicName() { return "sm_maski_v3_room_" + roomId; }

        async function sendNetMessage(payload) {
            try {
                await fetch("https://ntfy.sh/" + getTopicName(), { method: "POST", body: JSON.stringify(payload) });
            } catch(e) {}
        }

        function initSession(hostFlag) {
            isHost = hostFlag;
            myName = isHost ? document.getElementById('username-host').value.trim() : document.getElementById('username-guest').value.trim();
            if (!myName) return alert("Введите имя!");

            if (isHost) roomId = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('status-text').innerText = "Подключение к облаку...";
            
            eventSource = new EventSource("https://ntfy.sh/" + getTopicName() + "/sse");
            
            eventSource.onopen = () => {
                document.getElementById('status-text').innerText = "Онлайн активен";
                if (isHost) {
                    gameState.players = [{ id: myId, name: myName, score: 0 }];
                    renderUI();
                } else {
                    sendNetMessage({ type: "JOIN_REQ", id: myId, name: myName });
                }
            };

            eventSource.onmessage = (event) => {
                try {
                    let data = JSON.parse(event.data);
                    let msg = JSON.parse(data.message);
                    handleNetworkMessage(msg);
                } catch(e) {}
            };
        }

        function handleNetworkMessage(msg) {
            if (isHost) {
                if (msg.type === "JOIN_REQ") {
                    // Защита от дублей: проверяем, нет ли уже игрока с таким уникальным ID
                    if (!gameState.players.some(p => p.id === msg.id)) {
                        gameState.players.push({ id: msg.id, name: msg.name, score: 0 });
                        sendNetMessage({ type: "SYNC", state: gameState });
                        renderUI();
                    }
                }
                if (msg.type === "ACTION") processAction(msg.action);
            } else {
                if (msg.type === "SYNC") {
                    gameState = msg.state;
                    renderUI();
                }
            }
        }

        function sendAction(actionType) {
            if (isHost) processAction(actionType);
            else sendNetMessage({ type: "ACTION", action: actionType });
        }

        function processAction(actionType) {
            if (!isHost) return;
            
            if (actionType === "ANSWER_TRUE") {
                gameState.players[gameState.activeIndex].score += 1;
            }
            
            if (actionType !== "START") {
                gameState.activeIndex = (gameState.activeIndex + 1) % gameState.players.length;
            }
            
            let activePlayer = gameState.players[gameState.activeIndex];
            
            // Динамическая адаптация под любое количество игроков (2, 3, 4 и более)
            let otherPlayers = gameState.players.filter(p => p.id !== activePlayer.id).map(p => p.name);
            otherPlayers.sort(() => Math.random() - 0.5);

            let q = questions[Math.floor(Math.random() * questions.length)];
            let text = q.text;
            
            // Если в вопросе есть шаблоны и игроков хватает, подставляем их имена вместо заглушек
            text = text.replace(/{T1}/g, otherPlayers[0] || "друг");
            text = text.replace(/{T2}/g, otherPlayers[1] || "компания");

            gameState.currentQ = { cat: q.cat, text: text };
            gameState.state = "game";

            sendNetMessage({ type: "SYNC", state: gameState });
            renderUI();
        }

        function pressStart() {
            if (!isHost) return;
            if (gameState.players.length < 2) return alert("Нужно хотя бы 2 игрока!");
            processAction("START");
        }

        function renderUI() {
            document.getElementById('screen-auth-host').classList.add('hidden');
            document.getElementById('screen-auth-guest').classList.add('hidden');

            if (gameState.state === "lobby") {
                document.getElementById('screen-lobby').classList.remove('hidden');
                document.getElementById('room-code-display').innerText = roomId;

                if (!isHost) {
                    document.getElementById('qr-area').classList.add('hidden');
                    document.getElementById('start-btn').classList.add('hidden');
                } else {
                    let shareUrl = window.location.href.split('?')[0] + "?room=" + roomId;
                    document.getElementById('canvas-qr').innerHTML = ""; 
                    new QRious({ element: document.getElementById('canvas-qr'), value: shareUrl, size: 160 });
                    document.getElementById('link-display').onclick = () => {
                        navigator.clipboard.writeText(shareUrl);
                        alert("Ссылка скопирована!");
                    };
                }

                const list = document.getElementById('lobby-players');
                list.innerHTML = "";
                gameState.players.forEach(p => {
                    list.innerHTML += `<div class="player-item"><span>${p.name}</span><span style="color:#10b981">В сети</span></div>`;
                });
            } else if (gameState.state === "game") {
                document.getElementById('screen-lobby').classList.add('hidden');
                document.getElementById('screen-game').classList.remove('hidden');

                let activePlayer = gameState.players[gameState.activeIndex];
                document.getElementById('round-tag').innerText = gameState.currentQ.cat;
                document.getElementById('active-player-name').innerText = "Ход игрока: " + activePlayer.name;
                document.getElementById('question-text').innerHTML = gameState.currentQ.text;

                const list = document.getElementById('game-players');
                list.innerHTML = "";
                gameState.players.forEach((p, idx) => {
                    let isCurrent = idx === gameState.activeIndex ? "active" : "";
                    list.innerHTML += `<div class="player-item ${isCurrent}"><span>${p.name} ${isCurrent?'🎲':''}</span><span>${p.score}🏆</span></div>`;
                });
            }
        }
    </script>
</body>
</html>
